version: '3.8'

services:
  # 1. MINIO - Object Storage Layer
  minio:
    image: minio/minio:latest
    container_name: tiki_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse_net

  minio-init:
    image: minio/mc:latest
    container_name: tiki_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      /usr/bin/mc config host add myminio http://minio:9000 admin minio_password &&
      /usr/bin/mc mb myminio/raw-data || true &&
      /usr/bin/mc mb myminio/lakehouse || true &&
      exit 0
      "
    networks:
      - lakehouse_net

  # 2. POSTGRES - Metastore & Superset Backend
  postgres:
    image: postgres:15
    container_name: tiki_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: metastore
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - lakehouse_net

  # 3. TRINO - Distributed Query Engine
  trino:
    image: trinodb/trino:latest
    container_name: tiki_trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
    networks:
      - lakehouse_net
    depends_on:
      - minio
      - postgres

  # 4. SUPERSET - Visualization (BI)
  superset:
    image: apache/superset:latest
    container_name: tiki_superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "super_secret_lakehouse_key"
      SUPERSET_LOAD_EXAMPLES: "no"
      SQLALCHEMY_DATABASE_URI: "postgresql://admin:admin_password@postgres:5432/metastore"
    networks:
      - lakehouse_net
    # Initialize the database and admin user
    entrypoint: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@lakehouse.local --password admin_password &&
      superset init &&
      gunicorn -w 2 --timeout 120 -b 0.0.0.0:8088 --limit-request-line 0 --limit-request-field_size 0 superset.app:create_app()
      "
    depends_on:
      - postgres
      - trino

networks:
  lakehouse_net:
    driver: bridge

volumes:
  minio_data:
  pg_data:
